<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Let's Link — Connect with skilled people nearby for home repairs, deliveries, errands, and more. Affordable, fast, and safe.">
  <meta name="theme-color" content="#6C5CE7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Let's Link — Get Things Done, Right In Your Neighborhood</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="main-nav">
    <a href="#/home" class="navbar-brand">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <span>Let's <span class="text-gradient">Link</span></span>
    </a>

    <div class="flex items-center gap-sm">
      <div class="navbar-nav">
        <a href="#/home" class="nav-link active" data-page="home">🏠 <span>Home</span></a>
        <a href="#/browse" class="nav-link" data-page="browse">🔍 <span>Browse</span></a>
        <a href="#/post" class="nav-link" data-page="post">📝 <span>Post</span></a>
        <a href="#/my-tasks" class="nav-link" data-page="my-tasks">📋 <span>My Tasks</span></a>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌓</button>
      <div id="nav-auth">
        <a href="#/login" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- SOS Button (visible when logged in during active task) -->
  <button class="sos-btn" id="sos-btn" style="display:none" onclick="app.triggerSOS()" title="Emergency SOS">
    🆘
  </button>

  <!-- App Content (SPA renders here) -->
  <main id="app">
    <div class="page flex justify-center items-center" style="min-height:100vh">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Theme Toggle -->
  <script>
    function toggleTheme() {
      const body = document.body;
      body.classList.toggle('light-theme');
      const isLight = body.classList.contains('light-theme');
      localStorage.setItem('letslink_theme', isLight ? 'light' : 'dark');
      document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '🌓';
    }
    // Restore theme
    if (localStorage.getItem('letslink_theme') === 'light') {
      document.body.classList.add('light-theme');
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = '🌙';
      });
    }
  </script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
